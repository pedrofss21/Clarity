<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <section id="dashboard" class="page active">
    <h2>Dashboard</h2>

    <div class="card">
      <p>Saldo Total</p>
      <h1 id="saldoTotal">R$ 0,00</h1>
    </div>

    <div class="grid">
      <div class="mini-card">
        <p>Receitas</p>
        <span id="totalReceitas"></span>
      </div>

      <div class="mini-card">
        <p>Despesas</p>
        <span id="totalDespesas"></span>
      </div>
    </div>

    <canvas id="grafico"></canvas>

    <div class="card">
      <p>Saúde Financeira</p>
      <h2 id="indiceSaude"></h2>
    </div>

  </section>

  <section id="transacoes" class="page">
    <h2>Transações</h2>
    <button onclick="novaTransacao()">Nova Transação</button>
    <ul id="listaTransacoes"></ul>
  </section>

  <section id="metas" class="page">
    <h2>Metas</h2>
    <button onclick="definirMeta()">Definir Meta</button>
    <div id="infoMeta"></div>
  </section>

  <section id="config" class="page">
    <h2>Configurações</h2>
    <button onclick="exportarBackup()">Exportar Backup</button>
    <button onclick="resetar()">Resetar Dados</button>
  </section>

  <nav class="navbar">
    <button onclick="trocarPagina('dashboard')">🏠</button>
    <button onclick="trocarPagina('transacoes')">💸</button>
    <button onclick="trocarPagina('metas')">🎯</button>
    <button onclick="trocarPagina('config')">⚙️</button>
  </nav>

</div>

<script src="js/storage.js"></script>
<script src="js/analytics.js"></script>
<script src="js/app.js"></script>
</body>
</html>
