<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

<header class="header">
  <div>
    <h1>Olá, Pedro 👋</h1>
    <p>Seu resumo financeiro</p>
  </div>
</header>

<section class="saldo-card">
  <p>Saldo Total</p>
  <h2 id="saldoTotal">R$ 0,00</h2>
  <span>Disponível</span>
</section>

<section class="resumo-cards">
  <div class="mini receita">
    <p>Receitas</p>
    <h3 id="totalReceitas">R$ 0,00</h3>
  </div>

  <div class="mini despesa">
    <p>Despesas</p>
    <h3 id="totalDespesas">R$ 0,00</h3>
  </div>
</section>

<section class="grafico">
  <h3>Despesas do Mês</h3>
  <canvas id="graficoPizza"></canvas>
</section>

<section class="transacoes">
  <h3>Últimas Transações</h3>
  <ul id="listaTransacoes"></ul>
</section>

<nav class="navbar">
  <button>🏠</button>
  <button>💳</button>
  <button>🎯</button>
  <button>👤</button>
</nav>

</div>

<script src="js/storage.js"></script>
<script src="js/analytics.js"></script>
<script src="js/app.js"></script>
</body>
</html>
