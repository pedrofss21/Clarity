<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Controle Financeiro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<header>

<h2>Resumo Financeiro</h2>

</header>

<div class="saldo-card">

<h3>Saldo Total</h3>

<h1 id="saldo">R$ 0,00</h1>

</div>

<div class="resumo">

<div class="card receita">

Receitas  
<h3 id="receitas">R$0</h3>

</div>

<div class="card despesa">

Despesas  
<h3 id="despesas">R$0</h3>

</div>

</div>

<button onclick="abrirModal()" class="btn">

+ Adicionar Transação

</button>

<div class="card">

<h3>Despesas do mês</h3>

<canvas id="pieChart"></canvas>

</div>

<div class="card">

<h3>Gastos semanais</h3>

<canvas id="barChart"></canvas>

</div>

<div class="card">

<h3>Transações</h3>

<div id="listaTransacoes"></div>

</div>

</div>

<div id="modal" class="modal">

<div class="modal-content">

<h3>Nova Transação</h3>

<input id="nome" placeholder="Descrição">

<input id="valor" type="number" placeholder="Valor">

<select id="tipo">

<option value="receita">Receita</option>
<option value="despesa">Despesa</option>

</select>

<button onclick="salvarTransacao()">

Salvar

</button>

</div>

</div>

<script src="database.js"></script>
<script src="charts.js"></script>
<script src="app.js"></script>

</body>

</html>
