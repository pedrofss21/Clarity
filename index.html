<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Higienizações</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="dark">

  <div class="page">

    <!-- Header -->
    <header class="header">
      <div>
        <div class="eyebrow">Registro diário</div>
        <h1>Higienizações</h1>
      </div>
      <button id="themeToggle" class="icon-btn" aria-label="Alternar tema">🌙</button>
    </header>

    <main class="content">

      <!-- Serviço -->
      <section class="section">
        <div class="label">Serviço</div>
        <div class="segmented" id="servicoControl">
          <button class="segment active" data-value="Higienização">✨ Higienização</button>
          <button class="segment" data-value="Polimento">🚗 Polimento</button>
        </div>
      </section>

      <!-- Tipo do veículo -->
      <section class="section">
        <div class="label">Tipo do veículo</div>
        <div class="segmented" id="tipoControl">
          <button class="segment" data-value="Novo">Novo</button>
          <button class="segment active" data-value="Semi-novo">Semi-novo</button>
        </div>
      </section>

      <!-- Card principal -->
      <section class="card">
        <div class="commission-row">
          <span class="commission-label">Comissão estimada</span>
          <span class="commission-value" id="commissionValue">R$ 7,00</span>
        </div>

        <input type="text" id="modeloInput" class="input" placeholder="MODELO DO CARRO" />
        <input type="text" id="placaInput" class="input" placeholder="PLACA OU CHASSI" />
        <input type="date" id="dataInput" class="input" />

        <button id="addBtn" class="primary-btn">Adicionar veículo</button>
      </section>

      <!-- Lista de veículos -->
      <section id="carList" class="car-list"></section>

      <!-- Gerar PDF -->
      <button class="secondary-btn">Gerar PDF</button>

      <!-- Resumo -->
      <section class="summary">
        <div>
          <div class="summary-label">Total de carros</div>
          <div class="summary-value" id="totalCars">0</div>
        </div>
        <div class="summary-right">
          <div class="summary-label">Total em comissões</div>
          <div class="summary-value accent" id="totalCommission">R$ 0,00</div>
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
