<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gestão de Higienizações</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Sistema de Gestão</h1>

    <!-- Serviço -->
    <div class="card">
      <label>Serviço</label>
      <div class="grid">
        <button onclick="setService('Higienização')">Higienização</button>
        <button onclick="setService('Polimento')">Polimento</button>
      </div>

      <label>Tipo do Veículo</label>
      <div class="grid">
        <button onclick="setType('Novo')">Novo</button>
        <button onclick="setType('Semi-novo')">Semi-novo</button>
      </div>

      <label>Placa</label>
      <input id="plate" placeholder="ABC1234" />

      <button class="primary" onclick="addRecord()">+ Adicionar</button>
    </div>

    <!-- Stats -->
    <div class="card">
      <h3>Resumo</h3>
      <p id="totalCars">0 veículos</p>
      <p id="totalComm">R$ 0,00</p>
    </div>

    <!-- Lista -->
    <div class="card">
      <h3>Registros</h3>
      <div id="list"></div>
    </div>

    <button class="primary" onclick="exportHTML()">Gerar Relatório</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
